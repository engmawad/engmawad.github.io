    ];

    // بناء الاختبار
    let currentScore = 0;
    const totalQs = questionsData.length;
    const container = document.getElementById('quiz-container');
    const scoreSpan = document.getElementById('score');
    const totalSpan = document.getElementById('total');
    totalSpan.innerText = totalQs;

    function buildExam() {
        container.innerHTML = '';
        let lastChapter = '';
        for (let i = 0; i < questionsData.length; i++) {
            const item = questionsData[i];
            if (lastChapter !== item.chapter) {
                const chapterDiv = document.createElement('div');
                chapterDiv.className = 'chapter-badge';
                chapterDiv.innerText = `📚 ${item.chapter}`;
                container.appendChild(chapterDiv);
                lastChapter = item.chapter;
            }

            const card = document.createElement('div');
            card.className = 'question-card';
            const title = document.createElement('div');
            title.className = 'question-title';
            title.innerText = `${i+1}. ${item.q}`;
            card.appendChild(title);

            const grid = document.createElement('div');
            grid.className = 'options-grid';
            const btns = [];
            item.options.forEach((opt, idx) => {
                const btn = document.createElement('button');
                btn.className = 'option-btn';
                btn.innerText = opt;
                btn.setAttribute('data-opt', idx);
                btn.onclick = () => handleAnswer(i, idx, btn, card);
                grid.appendChild(btn);
                btns.push(btn);
            });
            card.appendChild(grid);
            const fb = document.createElement('div');
            fb.className = 'feedback';
            fb.id = `fb-${i}`;
            card.appendChild(fb);
            container.appendChild(card);
        }
    }

    function handleAnswer(qIdx, selectedIdx, btn, card) {
        const question = questionsData[qIdx];
        const allBtns = card.querySelectorAll('.option-btn');
        if (allBtns[0].disabled) return; // already answered

        for (let i = 0; i < allBtns.length; i++) {
            allBtns[i].disabled = true;
            if (i === question.answer) {
                allBtns[i].classList.add('correct');
            }
        }

        const feedbackDiv = card.querySelector('.feedback');
        feedbackDiv.style.display = 'block';
        if (selectedIdx === question.answer) {
            currentScore++;
            scoreSpan.innerText = currentScore;
            feedbackDiv.innerHTML = "✅ إجابة صحيحة! أحسنت.";
            feedbackDiv.style.color = "#0f6e3f";
            feedbackDiv.style.borderRightColor = "#2b8c4a";
            feedbackDiv.style.backgroundColor = "#e6f7ec";
        } else {
            btn.classList.add('incorrect');
            const correctAns = question.options[question.answer];
            feedbackDiv.innerHTML = `❌ إجابة خاطئة. الإجابة الصحيحة: ${correctAns}`;
            feedbackDiv.style.color = "#b91c1c";
            feedbackDiv.style.borderRightColor = "#c73e3e";
            feedbackDiv.style.backgroundColor = "#ffe8e8";
        }
    }

    buildExam();
</script>
