    let currentScore = 0;
    const quizContainer = document.getElementById('quiz-container');

    questions.forEach((quiz, qIdx) => {
        const card = document.createElement('div');
        card.className = 'question-card';
        
        const title = document.createElement('div');
        title.className = 'question-title';
        title.innerText = `س${qIdx + 1}: ${quiz.q}`;
        card.appendChild(title);
        
        const optionsGrid = document.createElement('div');
        optionsGrid.className = 'options-grid';
        
        quiz.options.forEach((opt, oIdx) => {
            const btn = document.createElement('button');
            btn.className = 'option-btn';
            btn.innerText = opt;
            btn.onclick = function() {
                checkAnswer(qIdx, oIdx, btn, card);
            };
            optionsGrid.appendChild(btn);
        });
        
        card.appendChild(optionsGrid);
        
        const feedback = document.createElement('div');
        feedback.className = 'feedback';
        feedback.id = `feedback-${qIdx}`;
        card.appendChild(feedback);
        
        quizContainer.appendChild(card);
    });

    function checkAnswer(qIdx, selectedIdx, clickedBtn, card) {
        const quiz = questions[qIdx];
        const buttons = card.getElementsByClassName('option-btn');
        
        for(let i=0; i<buttons.length; i++) {
            buttons[i].disabled = true;
            if(i === quiz.answer) {
                buttons[i].classList.add('correct');
            }
        }
        
        const feedback = document.getElementById(`feedback-${qIdx}`);
        feedback.style.display = 'block';
        
        if (selectedIdx === quiz.answer) {
            currentScore++;
            document.getElementById('score').innerText = currentScore;
            feedback.innerText = "✓ إجابة صحيحة، ممتاز!";
            feedback.style.color = "#38a169";
        } else {
            clickedBtn.classList.add('incorrect');
            feedback.innerText = `✗ إجابة خاطئة! الصواب: ${quiz.options[quiz.answer]}`;
            feedback.style.color = "#e53e3e";
        }
    }
